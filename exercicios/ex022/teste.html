<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cadastro - Ranking Tênis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #f8fafc, #e8f7ee);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 480px;
}

.header {
  text-align: center;
  margin-bottom: 24px;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  color: #0f172a;
}

.header p {
  margin-top: 8px;
  color: #475569;
  font-size: 14px;
}

.card {
  background: #ffffff;
  padding: 32px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: #1e293b;
}

.input-wrapper {
  position: relative;
}

.input-wrapper span {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
}

input {
  width: 100%;
  padding: 12px 12px 12px 36px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  font-size: 14px;
  transition: all 0.2s ease;
}

input:focus {
  outline: none;
  border-color: #16a34a;
  box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
}

.checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #475569;
  margin-top: 6px;
}

button {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(90deg, #16a34a, #22c55e);
  color: white;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(22, 163, 74, 0.25);
}

.security-note {
  margin-top: 14px;
  text-align: center;
  font-size: 12px;
  color: #64748b;
}

.footer {
  text-align: center;
  margin-top: 18px;
  font-size: 13px;
  color: #475569;
}

.footer a {
  color: #16a34a;
  text-decoration: none;
  font-weight: 600;
}

.footer a:hover {
  text-decoration: underline;
}

</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Crie sua conta e comece a pontuar 🎾</h1>
    <p>Entre para o ranking, acompanhe seu desempenho e desafie seus amigos.</p>
  </div>

  <div class="card">

    <div class="form-group">
      <label>Seu nome completo (privado)</label>
      <div class="input-wrapper">
        <span>👤</span>
        <input type="text" placeholder="Digite seu nome completo" />
      </div>
    </div>

    <div class="form-group">
      <label>Como você quer aparecer no ranking?</label>
      <div class="input-wrapper">
        <span>⭐</span>
        <input type="text" placeholder="Seu apelido" />
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrapper">
        <span>📧</span>
        <input type="email" placeholder="seuemail@email.com" />
      </div>
    </div>

    <div class="form-group">
      <label>Crie uma senha segura</label>
      <div class="input-wrapper">
        <span>🔒</span>
        <input type="password" placeholder="••••••••" />
      </div>
    </div>

    <div class="form-group">
      <label>WhatsApp (opcional)</label>
      <div class="input-wrapper">
        <span>📱</span>
        <input type="text" placeholder="(00) 00000-0000" />
      </div>
    </div>

    <div class="form-group">
      <label>Clube em que você joga</label>
      <div class="input-wrapper">
        <span>🎾</span>
        <input type="text" placeholder="Nome do clube" />
      </div>
      <div class="checkbox">
        <input type="checkbox" id="nenhum" />
        <label for="nenhum" style="margin:0;font-weight:400;">Não jogo em clube</label>
      </div>
    </div>

    <button>Criar minha conta</button>

    <div class="security-note">
      🔒 Seus dados estão protegidos e nunca serão compartilhados.
    </div>

  </div>

  <div class="footer">
    Já tem uma conta? <a href="#">Entrar</a>
  </div>

</div>

</body>
</html>
